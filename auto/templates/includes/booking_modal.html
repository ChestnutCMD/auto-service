<div id="bookingModal" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h3 class="modal-title" id="bookingModalTitle">
                <i class="fas fa-calendar-check"></i> Запись на услугу
            </h3>
            <button type="button" class="modal-close" onclick="closeBookingModal()">
                <i class="fas fa-times"></i>
            </button>
        </div>

        <form id="bookingForm" method="post" class="modal-body">
            {% csrf_token %}
            <input type="hidden" name="attendance" id="id_attendance">

            <div class="form-group">
                <label for="id_name" class="form-label">
                    <i class="fas fa-user"></i> Ваше имя *
                </label>
                <input type="text" name="name" id="id_name" required
                       placeholder="Как к вам обращаться?"
                       class="form-input">
                <div class="form-error" id="name_error"></div>
            </div>

            <div class="form-group">
                <label for="id_phone" class="form-label">
                    <i class="fas fa-phone"></i> Телефон для связи *
                </label>
                <input type="tel" name="phone" id="id_phone" required
                       placeholder="+7 (999) 999-99-99"
                       class="form-input">
                <small class="form-hint">Только для связи по поводу записи</small>
                <div class="form-error" id="phone_error"></div>
            </div>

            <div class="form-group">
                <label class="form-label">
                    <i class="fas fa-comments"></i> Способ связи
                </label>

                <div class="custom-select">
                    <div class="select-selected">
                        <i class="fas fa-phone select-icon"></i>
                        <span class="select-text">Телефон</span>
                        <i class="fas fa-chevron-down select-arrow"></i>
                    </div>
                    <div class="select-items">
                        <div class="select-option" data-value="phone">
                            <i class="fas fa-phone option-icon" style="color: #2563eb;"></i>
                            <span>Телефон</span>
                        </div>
                        <div class="select-option" data-value="whatsapp">
                            <i class="fab fa-whatsapp option-icon" style="color: #25D366;"></i>
                            <span>WhatsApp</span>
                        </div>
<!--                        <div class="select-option" data-value="telegram">-->
<!--                            <i class="fab fa-telegram option-icon" style="color: #0088cc;"></i>-->
<!--                            <span>Telegram</span>-->
<!--                        </div>-->
<!--                        <div class="select-option" data-value="sms">-->
<!--                            <i class="fas fa-comment-sms option-icon" style="color: #8b5cf6;"></i>-->
<!--                            <span>SMS</span>-->
<!--                        </div>-->
                    </div>
                    <input type="hidden" name="communication" id="id_communication" value="phone">
                </div>
            </div>

            <!-- Кастомный календарь -->
            <div class="form-group">
                <label class="form-label">
                    <i class="fas fa-calendar-alt"></i> Выберите дату и время *
                </label>

                <div class="custom-calendar">
                    <div class="calendar-header">
                        <button type="button" class="calendar-nav" id="prevMonth">
                            <i class="fas fa-chevron-left"></i>
                        </button>
                        <h4 id="currentMonthYear">Ноябрь 2025</h4>
                        <button type="button" class="calendar-nav" id="nextMonth">
                            <i class="fas fa-chevron-right"></i>
                        </button>
                    </div>

                    <div class="calendar-weekdays">
                        <div>Пн</div>
                        <div>Вт</div>
                        <div>Ср</div>
                        <div>Чт</div>
                        <div>Пт</div>
                        <div>Сб</div>
                        <div>Вс</div>
                    </div>

                    <div class="calendar-grid" id="calendarGrid">
                        <!-- Динамически заполняется JavaScript -->
                    </div>

                    <div class="time-selection" id="timeSelection" style="display: none;">
                        <h5 style="margin-bottom: 1rem; color: #374151; font-size: 0.9rem;">Выберите время:</h5>
                        <div class="time-slots" id="timeSlots">
                            <!-- Динамически заполняется JavaScript -->
                        </div>
                    </div>

                    <input type="hidden" name="time" id="selectedDateTime" required>
                    <input type="hidden" id="selectedDate" value="">
                </div>

                <div class="form-error" id="time_error"></div>

            </div>

            <!-- Согласие с политикой -->
            <div class="privacy-agreement">
                <label>
                    <input type="checkbox" name="privacy_agreement" required>
                    <span>
                        Я соглашаюсь с
                        <a href="/privacy/" target="_blank" style="color: #2563eb; text-decoration: underline;">
                            политикой конфиденциальности
                        </a>
                        и даю согласие на обработку персональных данных
                    </span>
                </label>
            </div>

            <div class="form-actions">
                <button type="button" class="btn-secondary" onclick="closeBookingModal()">
                    <i class="fas fa-times"></i> Отмена
                </button>
                <button type="submit" class="btn-primary">
                    <i class="fas fa-paper-plane"></i> Записаться
                </button>
            </div>
        </form>
    </div>
</div>
