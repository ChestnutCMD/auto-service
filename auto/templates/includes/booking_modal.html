<!-- Убедитесь что модальное окно имеет правильную структуру -->
<div id="bookingModal" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h3 class="modal-title" id="bookingModalTitle">
                <i class="fas fa-calendar-check"></i> Запись на услугу
            </h3>
            <button type="button" class="modal-close" onclick="closeBookingModal()">
                <i class="fas fa-times"></i>
            </button>
        </div>

        <form id="bookingForm" method="post" class="modal-body">
            {% csrf_token %}
            <input type="hidden" name="attendance" id="id_attendance">

            <div class="form-group">
                <label for="id_name" class="form-label">
                    <i class="fas fa-user"></i> Ваше имя *
                </label>
                <input type="text" name="name" id="id_name" required
                       placeholder="Как к вам обращаться?"
                       class="form-input">
                <div class="form-error" id="name_error"></div>
            </div>

            <div class="form-group">
                <label for="id_phone" class="form-label">
                    <i class="fas fa-phone"></i> Телефон для связи *
                </label>
                <input type="tel" name="phone" id="id_phone" required
                       placeholder="+7 (999) 999-99-99"
                       class="form-input">
                <small class="form-hint">Только для связи по поводу записи</small>
                <div class="form-error" id="phone_error"></div>
            </div>

            <div class="form-group">
                <label for="id_communication" class="form-label">
                    <i class="fas fa-comments"></i> Способ связи
                </label>
                <select name="communication" id="id_communication" class="form-input">
                    <option value="phone">📞 Телефон</option>
                    <option value="whatsapp">💚 WhatsApp</option>
                </select>
            </div>

            <div class="form-group">
                <label for="id_time" class="form-label">
                    <i class="fas fa-calendar-alt"></i> Желаемое время *
                </label>
                <input type="datetime-local" name="time" id="id_time" required
                       class="form-input">
                <div class="form-error" id="time_error"></div>
                <small class="form-hint">Выберите удобную дату и время</small>
            </div>

            <!-- Согласие с политикой -->
            <div class="privacy-agreement" style="margin: 1rem 0; padding: 1rem; background: #f8f9fa; border-radius: 0.5rem;">
                <label style="display: flex; align-items: flex-start; gap: 0.5rem; cursor: pointer;">
                    <input type="checkbox" name="privacy_agreement" required style="margin-top: 0.25rem;">
                    <span style="font-size: 0.875rem;">
                        ✅ Я соглашаюсь с
                        <a href="/privacy/" target="_blank" style="color: #2563eb; text-decoration: underline;">
                            политикой конфиденциальности
                        </a>
                        и даю согласие на обработку персональных данных
                    </span>
                </label>
            </div>

            <div class="form-actions">
                <button type="button" class="btn-secondary" onclick="closeBookingModal()">
                    <i class="fas fa-times"></i> Отмена
                </button>
                <button type="submit" class="btn-primary">
                    <i class="fas fa-paper-plane"></i> Записаться на услугу
                </button>
            </div>
        </form>
    </div>
</div>
