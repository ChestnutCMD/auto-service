name: Build and deploy

on: [push]

jobs:
  build_and_push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/auto-service:latest
            ${{ secrets.DOCKER_USERNAME }}/auto-service:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    runs-on: ubuntu-latest
    needs: build_and_push
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create docker-compose.yaml file
        run: |
          cat > docker-compose.yaml << 'EOF'
          version: '3.8'

          services:
            api:
              image: ${{ secrets.DOCKER_USERNAME }}/auto-service:latest
              restart: always
              container_name: django_app
              env_file:
                - .env
              environment:
                DB_HOST: postgres
              volumes:
                - ./media:/app/media
                - ./static:/app/static
              ports:
                - "8000:8000"
              depends_on:
                postgres:
                  condition: service_healthy
                redis:
                  condition: service_healthy

            postgres:
              image: postgres:15
              container_name: autoservice_postgres
              environment:
                POSTGRES_DB: ${{ secrets.POSTGRES_DB }}
                POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
                POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
              volumes:
                - postgres_data:/var/lib/postgresql/data
              healthcheck:
                test: ["CMD-SHELL", "pg_isready -U ${{ secrets.POSTGRES_USER }} -d ${{ secrets.POSTGRES_DB }}"]
                interval: 10s
                timeout: 5s
                retries: 5

            redis:
              image: redis:7-alpine
              container_name: autoservice_redis
              healthcheck:
                test: ["CMD", "redis-cli", "ping"]
                interval: 10s
                timeout: 5s
                retries: 5

          volumes:
            postgres_data:
          EOF

      - name: Create .env file
        run: |
          cat > .env << EOF
          DEBUG=0
          SECRET_KEY=${{ secrets.SECRET_KEY }}
          DB_NAME=${{ secrets.POSTGRES_DB }}
          DB_USER=${{ secrets.POSTGRES_USER }}
          DB_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
          DB_HOST=postgres
          DB_PORT=5432
          ALLOWED_HOSTS=localhost,127.0.0.1,0.0.0.0,${{ secrets.HOST }}
          TELEGRAM_BOT_TOKEN=${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID=${{ secrets.TELEGRAM_CHAT_ID }}
          EOF

      - name: Copy files to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          password: ${{ secrets.PASSWORD }}
          source: "docker-compose.yaml,.env"
          target: "/home/${{ secrets.USERNAME }}/app"
          strip_components: 0

      - name: Deploy app on server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          password: ${{ secrets.PASSWORD }}
          script: |
            echo "Current directory: $(pwd)"
            echo "Listing files in app directory:"
            ls -la /home/${{ secrets.USERNAME }}/app/
            
            cd /home/${{ secrets.USERNAME }}/app
            
            echo "Checking if docker-compose.yaml exists:"
            ls -la docker-compose.yaml
            
            echo "File content:"
            cat docker-compose.yaml
            
            # Создаем необходимые директории
            mkdir -p media static
            
            # Обновляем образ
            docker pull ${{ secrets.DOCKER_USERNAME }}/auto-service:latest
            
            # Запускаем приложение
            docker-compose down || true
            docker-compose up -d
            
            # Очистка старых образов
            docker image prune -f
            
            # Проверяем что контейнеры запущены
            echo "Running containers:"
            docker ps -a
            echo "Deployment completed successfully!"