name: Build and deploy

on: [push]

jobs:
  build_and_push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/auto-service:latest

  deploy:
    runs-on: ubuntu-latest
    needs: build_and_push
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create docker-compose.yaml file
        run: |
          cat > docker-compose.yaml << 'EOF'
          version: '3.8'

          services:
            api:
              image: ${{ secrets.DOCKER_USERNAME }}/auto-service:latest
              restart: always
              container_name: django_app
              environment:
                - DEBUG=0
                - SECRET_KEY=${{ secrets.SECRET_KEY }}
                - DB_NAME=${{ secrets.POSTGRES_DB }}
                - DB_USER=${{ secrets.POSTGRES_USER }}
                - DB_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
                - DB_HOST=postgres
                - DB_PORT=5432
                - ALLOWED_HOSTS=localhost,127.0.0.1,0.0.0.0,${{ secrets.HOST }}
                - TELEGRAM_BOT_TOKEN=${{ secrets.TELEGRAM_BOT_TOKEN }}
                - TELEGRAM_CHAT_ID=${{ secrets.TELEGRAM_CHAT_ID }}
              volumes:
                - ./media:/app/media
                - ./static:/app/static
              ports:
                - "8000:8000"
              depends_on:
                postgres:
                  condition: service_healthy

            postgres:
              image: postgres:15
              container_name: autoservice_postgres
              environment:
                POSTGRES_DB: ${{ secrets.POSTGRES_DB }}
                POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
                POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
              volumes:
                - postgres_data:/var/lib/postgresql/data
              healthcheck:
                test: ["CMD-SHELL", "pg_isready -U ${{ secrets.POSTGRES_USER }} -d ${{ secrets.POSTGRES_DB }}"]
                interval: 10s
                timeout: 5s
                retries: 5

          volumes:
            postgres_data:
          EOF

      - name: Copy files to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          password: ${{ secrets.PASSWORD }}
          source: "docker-compose.yaml"
          target: "/home/${{ secrets.USERNAME }}/app"

      - name: Deploy and debug
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          password: ${{ secrets.PASSWORD }}
          script: |
            cd /home/${{ secrets.USERNAME }}/app
            
            # Останавливаем старые контейнеры
            docker-compose down || true
            
            # Создаем директории
            mkdir -p media static
            
            # Запускаем
            docker-compose up -d
            
            # Ждем и проверяем логи
            sleep 10
            echo "=== Django logs ==="
            docker logs django_app --tail 50
            
            echo "=== PostgreSQL logs ==="
            docker logs autoservice_postgres --tail 20