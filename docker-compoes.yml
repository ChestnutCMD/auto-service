version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: autoservice_postgres
    environment:
      POSTGRES_DB: autoservice_db
      POSTGRES_USER: autoservice_user
      POSTGRES_PASSWORD: autoservice_password123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U autoservice_user -d autoservice_db"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data: